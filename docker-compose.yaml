version: "3.9"

services:
  db:
    image: postgres:14
    container_name: asset_pg
    environment:
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: postgres
      POSTGRES_DB: engineering_asset_registry
    ports:
      - "5432:5432"
    volumes:
      - pgdata:/var/lib/postgresql/data

  api:
    build: .
    container_name: asset_api
    depends_on:
      - db
    ports:
      - "8123:8123"
    environment:
      DATABASE_URL: postgresql://postgres:postgres@db:5432/engineering_asset_registry

volumes:
  pgdata:
